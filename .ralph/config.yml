project:
  name: "ralph-cli"
  language: typescript

architecture:
  layers:
    - config
    - utils
    - commands
    - cli
  direction: forward-only
  domains:
    - name: config
      path: src/config
    - name: lint
      path: src/commands/lint
    - name: grade
      path: src/commands/grade
    - name: gc
      path: src/commands/gc
    - name: doctor
      path: src/commands/doctor
    - name: init
      path: src/commands/init
    - name: plan
      path: src/commands/plan
    - name: promote
      path: src/commands/promote
    - name: ref
      path: src/commands/ref
    - name: hooks
      path: src/commands/hooks
    - name: ci
      path: src/commands/ci
    - name: run
      path: src/commands/run
    - name: review
      path: src/commands/review
  cross-cutting:
    - src/utils
  rules:
    max-lines: 500
    naming:
      schemas: "*Schema"
      types: "*Type"

quality:
  minimum-grade: C
  coverage:
    tool: vitest
    report-path: coverage/lcov.info

gc:
  consistency-threshold: 60
  exclude:
    - node_modules
    - dist
    - coverage
    - vitest.config.ts
    - loader.ts
    - output.ts

doctor:
  minimum-score: 8

paths:
  agents-md: AGENTS.md
  architecture-md: ARCHITECTURE.md
  docs: docs
  specs: docs/product-specs
  plans: docs/exec-plans
  design-docs: docs/design-docs
  references: docs/references
  generated: docs/generated
  quality: docs/QUALITY_SCORE.md

references:
  max-total-kb: 200
  warn-single-file-kb: 80
